<!DOCTYPE html>
<html lang="ka">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კურსები | მაკა გორდელაძე</title>
    <meta name="description" content="გაეცანი მაკა გორდელაძის ონლაინ კურსებს: არტთერაპია, მშობლებისთვის, კომუნიკაცია და ფსიქოლოგიის საფუძვლები.">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/redesign.css?v=20260413-drawer-polish-2">
    <script src="js/main.js?v=20260413-drawer-polish-2" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/courses.js" defer></script>
  </head>
  <body data-page="courses">
    <div data-site-header></div>

    <main class="courses-page" data-courses-page>
      <section class="page-hero page-hero--courses" aria-labelledby="courses-hero-title">
        <div class="container centered">
          <div class="courses-hero__content stack centered animate-on-scroll">
            <h1 id="courses-hero-title">კურსები</h1>
            <div class="breadcrumb breadcrumb--hero" aria-label="breadcrumb">
              <a href="index.html">მთავარი</a>
              <span class="breadcrumb__slash" aria-hidden="true">/</span>
              <span aria-current="page">კურსები</span>
            </div>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="container">
          <div class="courses-overview animate-on-scroll">
            <div class="section-heading">
              <span class="section-label">ონლაინ სწავლა</span>
              <h2>აირჩიე კურსი, რომელიც <em>ახლა გჭირდება</em></h2>
            </div>
          </div>

          <div class="catalog-toolbar card animate-on-scroll">
            <div class="catalog-filters" aria-label="კურსების ფილტრები">
              <button class="filter-chip is-active" type="button" data-course-filter="all">ყველა</button>
              <button class="filter-chip" type="button" data-course-filter="free">უფასო</button>
              <button class="filter-chip" type="button" data-course-filter="paid">ფასიანი</button>
              <button class="filter-chip" type="button" data-course-filter="არტთერაპია">არტთერაპია</button>
              <button class="filter-chip" type="button" data-course-filter="მშობლებისთვის">მშობლებისთვის</button>
              <button class="filter-chip" type="button" data-course-filter="კომუნიკაცია">კომუნიკაცია</button>
              <button class="filter-chip" type="button" data-course-filter="ფსიქოლოგია">ფსიქოლოგია</button>
            </div>

            <div class="catalog-search">
              <label class="sr-only" for="course-search">კურსის ძებნა</label>
              <input id="course-search" type="search" placeholder="კურსის ძებნა..." data-course-search>
            </div>
          </div>

          <div class="courses-grid" data-courses-grid></div>

          <div class="empty-state hide" data-courses-empty>
            მითითებული ფილტრებით კურსი ვერ მოიძებნა. სცადე სხვა კატეგორია ან ძიების გასუფთავება.
          </div>
        </div>
      </section>
    </main>

    <div data-site-footer></div>
  </body>
</html>
